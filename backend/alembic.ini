# ============================================================
# XinXi AI - Alembic Migration Config
# ============================================================
#
# Commands:
#   alembic revision --autogenerate -m "desc"  # Generate migration
#   alembic upgrade head                       # Apply all migrations
#   alembic downgrade -1                       # Rollback last migration
#   alembic history                            # View migration history
# ============================================================

[alembic]
script_location = alembic
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
sqlalchemy.url = postgresql+psycopg://langfuse:langfuse@localhost:5433/langfuse
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
